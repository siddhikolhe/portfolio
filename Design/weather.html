<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyCast — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   CSS VARIABLES — DARK / LIGHT THEMES
═══════════════════════════════════════════════════ */
:root {
  --transition: 0.4s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg-primary:   #0d0f1a;
  --bg-secondary: #111320;
  --bg-card:      rgba(255,255,255,0.06);
  --bg-card-hover:rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.12);
  --glass-shadow: rgba(0,0,0,0.4);
  --text-primary: #f0f4ff;
  --text-secondary:#a8b4d0;
  --text-muted:   rgba(168,180,208,0.55);
  --accent:       #4f8ef7;
  --accent-soft:  rgba(79,142,247,0.18);
  --accent-glow:  rgba(79,142,247,0.35);
  --highlight:    #64c8ff;
  --orb1:         rgba(79,142,247,0.25);
  --orb2:         rgba(130,80,255,0.20);
  --orb3:         rgba(0,200,150,0.12);
  --nav-bg:       rgba(17,19,32,0.95);
  --stat-bg:      rgba(255,255,255,0.05);
}

[data-theme="light"] {
  --bg-primary:   #ddeeff;
  --bg-secondary: #c8e0f8;
  --bg-card:      rgba(255,255,255,0.55);
  --bg-card-hover:rgba(255,255,255,0.75);
  --glass-border: rgba(255,255,255,0.7);
  --glass-shadow: rgba(100,140,200,0.15);
  --text-primary: #1a2340;
  --text-secondary:#3a5070;
  --text-muted:   rgba(58,80,112,0.55);
  --accent:       #2563eb;
  --accent-soft:  rgba(37,99,235,0.12);
  --accent-glow:  rgba(37,99,235,0.25);
  --highlight:    #0284c7;
  --orb1:         rgba(100,170,255,0.35);
  --orb2:         rgba(150,200,255,0.30);
  --orb3:         rgba(200,230,255,0.25);
  --nav-bg:       rgba(200,220,250,0.85);
  --stat-bg:      rgba(255,255,255,0.4);
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════
   ANIMATED BACKGROUND ORBS
═══════════════════════════════════════════════════ */
.bg-orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: orbFloat 10s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; top: -150px; left: -100px; background: var(--orb1); animation-delay: 0s; }
.orb-2 { width: 400px; height: 400px; bottom: -100px; right: -80px; background: var(--orb2); animation-delay: -4s; }
.orb-3 { width: 300px; height: 300px; top: 40%; left: 50%; background: var(--orb3); animation-delay: -7s; }

@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ═══════════════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════════════ */
.app-shell {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 76px 1fr;
  grid-template-rows: auto;
  min-height: 100vh;
}

/* ═══════════════════════════════════════════════════
   SIDEBAR NAV
═══════════════════════════════════════════════════ */
.sidebar {
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0;
  gap: 8px;
  position: sticky;
  top: 0;
  height: 100vh;
  z-index: 100;
}

.sidebar-logo {
  font-size: 26px;
  margin-bottom: 24px;
  animation: float 3.5s ease-in-out infinite;
}

.nav-item {
  width: 48px; height: 48px;
  border-radius: 14px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
  position: relative;
}
.nav-item:hover { background: var(--accent-soft); color: var(--accent); }
.nav-item.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.nav-item .tooltip {
  position: absolute;
  left: calc(100% + 12px);
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  letter-spacing: 0.5px;
}
.nav-item:hover .tooltip { opacity: 1; }

.sidebar-spacer { flex: 1; }

.theme-toggle {
  width: 48px; height: 48px;
  border-radius: 14px;
  border: 1px solid var(--glass-border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}
.theme-toggle:hover { background: var(--accent-soft); color: var(--accent); transform: rotate(20deg); }

/* ═══════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════ */
.main {
  padding: 28px 28px 40px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  overflow-y: auto;
}

/* ═══════════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-icon-inner {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 13px 16px 13px 44px;
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  backdrop-filter: blur(16px);
  outline: none;
  transition: all 0.3s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  border-color: var(--accent);
  background: var(--bg-card-hover);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.topbar-actions { display: flex; gap: 10px; align-items: center; }

.topbar-btn {
  height: 46px; padding: 0 18px;
  border-radius: 14px;
  border: 1px solid var(--glass-border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  backdrop-filter: blur(16px);
  transition: all 0.3s;
  white-space: nowrap;
}
.topbar-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.topbar-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.topbar-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }

/* History dropdown */
.search-history {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--nav-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  overflow: hidden;
  z-index: 200;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px var(--glass-shadow);
  display: none;
}
.search-history.show { display: block; }
.history-header { padding: 10px 16px 6px; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
.history-row {
  padding: 11px 16px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.15s;
  font-size: 14px; font-weight: 500; color: var(--text-secondary);
}
.history-row:hover { background: var(--accent-soft); color: var(--accent); }
.history-row span:first-child { font-size: 13px; color: var(--text-muted); }

/* ═══════════════════════════════════════════════════
   GLASS CARD BASE
═══════════════════════════════════════════════════ */
.glass-card {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px var(--glass-shadow);
  transition: background var(--transition), border var(--transition);
}
.glass-card:hover { background: var(--bg-card-hover); }

/* ═══════════════════════════════════════════════════
   HERO WEATHER CARD
═══════════════════════════════════════════════════ */
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
}

.hero-card {
  padding: 32px 36px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--accent) 0%, #6c47ff 60%, #a855f7 100%);
  border: none;
  animation: fadeUp 0.5s ease;
}
.hero-card::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  pointer-events: none;
}

.hero-location {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.hero-city {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 800;
  color: #fff;
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 6px;
}
.hero-date {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 28px;
}

.hero-temp-row { display: flex; align-items: flex-end; gap: 20px; }
.hero-temp {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(64px, 10vw, 96px);
  font-weight: 900;
  color: #fff;
  letter-spacing: -4px;
  line-height: 1;
}
.hero-temp-info { padding-bottom: 10px; }
.hero-desc { font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 4px; }
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.55); }

.hero-emoji {
  position: absolute;
  right: 28px; top: 24px;
  font-size: 100px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
  line-height: 1;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 28px;
}
.hero-stat {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  backdrop-filter: blur(10px);
}
.hero-stat-icon { font-size: 18px; margin-bottom: 6px; }
.hero-stat-value { font-size: 15px; font-weight: 700; color: #fff; }
.hero-stat-label { font-size: 10px; color: rgba(255,255,255,0.55); font-weight: 500; letter-spacing: 0.5px; margin-top: 2px; }

/* ═══════════════════════════════════════════════════
   SIDE PANEL (right of hero)
═══════════════════════════════════════════════════ */
.side-panel { display: flex; flex-direction: column; gap: 16px; }

.unit-toggle-card {
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeUp 0.5s 0.1s ease both;
}
.unit-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.toggle-pills {
  display: flex;
  background: var(--stat-bg);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.toggle-pill {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  background: transparent;
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.toggle-pill.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px var(--accent-glow); }

.air-quality-card {
  padding: 20px;
  flex: 1;
  animation: fadeUp 0.5s 0.2s ease both;
}
.aq-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.aq-value { font-size: 24px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
.aq-label { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.aq-bar { height: 6px; background: var(--stat-bg); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.aq-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444); width: 35%; transition: width 0.8s ease; }

.aq-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.aq-mini {
  background: var(--stat-bg);
  border-radius: 12px;
  padding: 10px 12px;
}
.aq-mini-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; }
.aq-mini-val { font-size: 15px; font-weight: 700; color: var(--text-primary); }

/* ═══════════════════════════════════════════════════
   HOURLY FORECAST
═══════════════════════════════════════════════════ */
.hourly-card {
  padding: 22px 24px;
  animation: fadeUp 0.5s 0.25s ease both;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.section-title { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
.section-tabs { display: flex; gap: 4px; }
.section-tab {
  padding: 6px 14px;
  border-radius: 10px;
  border: 1px solid var(--glass-border);
  background: transparent;
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.section-tab.active { background: var(--accent); color: #fff; border-color: transparent; }
.section-tab:hover:not(.active) { background: var(--accent-soft); color: var(--accent); }

.hourly-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.hourly-scroll::-webkit-scrollbar { display: none; }

.hour-card {
  min-width: 76px;
  background: var(--stat-bg);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 14px 10px;
  text-align: center;
  flex-shrink: 0;
  transition: all 0.25s;
  cursor: default;
}
.hour-card:hover { background: var(--accent-soft); border-color: var(--accent); transform: translateY(-3px); }
.hour-card.now {
  background: var(--accent);
  border-color: transparent;
  box-shadow: 0 6px 20px var(--accent-glow);
}
.hour-time { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.5px; }
.hour-card.now .hour-time { color: rgba(255,255,255,0.7); }
.hour-emoji { font-size: 26px; margin-bottom: 10px; }
.hour-temp { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.hour-card.now .hour-temp { color: #fff; }
.hour-rain { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
.hour-card.now .hour-rain { color: rgba(255,255,255,0.6); }

/* ═══════════════════════════════════════════════════
   BOTTOM GRID (forecast + other cities)
═══════════════════════════════════════════════════ */
.bottom-grid {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 20px;
}

/* 7-DAY FORECAST */
.forecast-card {
  padding: 22px 24px;
  animation: fadeUp 0.5s 0.3s ease both;
}
.forecast-rows { display: flex; flex-direction: column; gap: 6px; }
.forecast-row {
  display: grid;
  grid-template-columns: 90px 36px 1fr 80px;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 14px;
  background: var(--stat-bg);
  border: 1px solid transparent;
  transition: all 0.2s;
}
.forecast-row:hover { border-color: var(--glass-border); background: var(--bg-card-hover); }
.forecast-row.today { border-color: var(--accent); background: var(--accent-soft); }
.forecast-day { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.forecast-row.today .forecast-day { color: var(--accent); font-weight: 700; }
.forecast-icon { font-size: 22px; }
.forecast-bar-wrap { position: relative; height: 6px; background: var(--glass-border); border-radius: 3px; overflow: hidden; }
.forecast-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--highlight), var(--accent)); }
.forecast-temps { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
.temp-hi { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.temp-lo { font-size: 12px; color: var(--text-muted); }

/* OTHER CITIES */
.cities-card {
  padding: 22px;
  animation: fadeUp 0.5s 0.35s ease both;
}
.city-rows { display: flex; flex-direction: column; gap: 8px; }
.city-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  background: var(--stat-bg);
  border: 1px solid transparent;
  transition: all 0.2s;
  cursor: pointer;
}
.city-row:hover { border-color: var(--glass-border); background: var(--bg-card-hover); transform: translateX(3px); }
.city-emoji { font-size: 30px; flex-shrink: 0; }
.city-info { flex: 1; }
.city-name-text { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.city-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.city-temp-big { font-size: 24px; font-weight: 800; color: var(--text-primary); font-family: 'Outfit', sans-serif; }

/* ═══════════════════════════════════════════════════
   SUN TIMES MINI
═══════════════════════════════════════════════════ */
.sun-card {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: fadeUp 0.5s 0.4s ease both;
}
.sun-arc {
  width: 100%;
  height: 70px;
  position: relative;
}
.sun-arc svg { width: 100%; height: 100%; }
.sun-times { display: flex; justify-content: space-between; }
.sun-time-item { text-align: center; }
.sun-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.sun-value { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }

/* ═══════════════════════════════════════════════════
   QUICK CITY SHORTCUTS
═══════════════════════════════════════════════════ */
.quick-cities {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
}
.quick-btn {
  padding: 7px 16px;
  border-radius: 50px;
  border: 1px solid var(--glass-border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}
.quick-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }

/* ═══════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-12px) rotate(3deg); }
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE — TABLET
═══════════════════════════════════════════════════ */
@media (max-width: 1000px) {
  .hero-grid { grid-template-columns: 1fr; }
  .side-panel { display: grid; grid-template-columns: 1fr 1fr; }
  .bottom-grid { grid-template-columns: 1fr; }
  .hero-stats { grid-template-columns: repeat(4, 1fr); }
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE — MOBILE
═══════════════════════════════════════════════════ */
@media (max-width: 640px) {
  .app-shell { grid-template-columns: 1fr; grid-template-rows: 1fr 64px; }
  .sidebar {
    order: 2;
    flex-direction: row;
    height: 64px;
    width: 100%;
    border-right: none;
    border-top: 1px solid var(--glass-border);
    padding: 0 16px;
    justify-content: space-around;
    position: fixed;
    bottom: 0; left: 0; right: 0;
  }
  .sidebar-logo { display: none; }
  .sidebar-spacer { display: none; }
  .nav-item .tooltip { display: none; }
  .main { padding: 16px 16px 80px; }
  .hero-card { padding: 22px 20px; }
  .hero-emoji { font-size: 70px; top: 16px; right: 14px; }
  .hero-stats { grid-template-columns: repeat(2, 1fr); }
  .side-panel { grid-template-columns: 1fr; }
  .topbar { flex-direction: column; align-items: stretch; }
  .topbar-actions { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- BACKGROUND ORBS -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app-shell">

  <!-- ═══ SIDEBAR ═══ -->
  <nav class="sidebar">
    <div class="sidebar-logo">🌤</div>

    <button class="nav-item active" onclick="setNav(this)">
      🌡
      <span class="tooltip">Weather</span>
    </button>
    <button class="nav-item" onclick="setNav(this)">
      🏙
      <span class="tooltip">Cities</span>
    </button>
    <button class="nav-item" onclick="setNav(this)">
      🗺
      <span class="tooltip">Map</span>
    </button>
    <button class="nav-item" onclick="setNav(this)">
      📊
      <span class="tooltip">Stats</span>
    </button>
    <button class="nav-item" onclick="setNav(this)">
      ⚙️
      <span class="tooltip">Settings</span>
    </button>

    <div class="sidebar-spacer"></div>

    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">🌙</button>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-icon-inner">🔍</span>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search for a city..."
          autocomplete="off"
          onkeydown="handleKey(event)"
          onfocus="showHistory()"
          onblur="hideHistory()"
        />
        <div class="search-history" id="historyPanel">
          <div class="history-header">Recent</div>
          <div id="historyList"></div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="useLocation()">📍 My Location</button>
        <button class="topbar-btn primary" onclick="doSearch()">Search</button>
      </div>
    </div>

    <!-- QUICK CITIES -->
    <div class="quick-cities">
      <button class="quick-btn" onclick="quickLoad('London')">🇬🇧 London</button>
      <button class="quick-btn" onclick="quickLoad('Mumbai')">🇮🇳 Mumbai</button>
      <button class="quick-btn" onclick="quickLoad('Tokyo')">🇯🇵 Tokyo</button>
      <button class="quick-btn" onclick="quickLoad('New York')">🇺🇸 New York</button>
      <button class="quick-btn" onclick="quickLoad('Paris')">🇫🇷 Paris</button>
      <button class="quick-btn" onclick="quickLoad('Dubai')">🇦🇪 Dubai</button>
      <button class="quick-btn" onclick="quickLoad('Nashik')">🇮🇳 Nashik</button>
    </div>

    <!-- HERO GRID -->
    <div class="hero-grid">
      <!-- MAIN HERO CARD -->
      <div class="glass-card hero-card" id="heroCard">
        <div class="hero-location">📍 <span id="heroCountry">Spain</span></div>
        <div class="hero-city" id="heroCity">Madrid</div>
        <div class="hero-date" id="heroDate">Loading...</div>
        <div class="hero-temp-row">
          <div class="hero-temp" id="heroTemp">19°</div>
          <div class="hero-temp-info">
            <div class="hero-desc" id="heroDesc">Mostly Cloudy</div>
            <div class="hero-sub" id="heroSub">Feels like 17°</div>
          </div>
        </div>
        <div class="hero-emoji" id="heroEmoji">⛅</div>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-icon">💧</div>
            <div class="hero-stat-value" id="statHumidity">04%</div>
            <div class="hero-stat-label">Humidity</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-icon">💨</div>
            <div class="hero-stat-value" id="statWind">12 km/h</div>
            <div class="hero-stat-label">Wind</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-icon">🌧</div>
            <div class="hero-stat-value" id="statRain">80%</div>
            <div class="hero-stat-label">Rainfall</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-icon">👁</div>
            <div class="hero-stat-value" id="statVis">8 km</div>
            <div class="hero-stat-label">Visibility</div>
          </div>
        </div>
      </div>

      <!-- SIDE PANEL -->
      <div class="side-panel">
        <!-- Unit Toggle -->
        <div class="glass-card unit-toggle-card">
          <span class="unit-label">Temperature</span>
          <div class="toggle-pills">
            <button class="toggle-pill active" id="pillC" onclick="setUnit(true)">°C</button>
            <button class="toggle-pill" id="pillF" onclick="setUnit(false)">°F</button>
          </div>
        </div>

        <!-- Air Quality -->
        <div class="glass-card air-quality-card">
          <div class="aq-title">Air Quality</div>
          <div class="aq-value">3 — Low</div>
          <div class="aq-label">Low Health Risk · Good</div>
          <div class="aq-bar"><div class="aq-fill" id="aqFill"></div></div>
          <div class="aq-mini-grid">
            <div class="aq-mini">
              <div class="aq-mini-label">UV Index</div>
              <div class="aq-mini-val">4 — Mod</div>
            </div>
            <div class="aq-mini">
              <div class="aq-mini-label">Sunrise</div>
              <div class="aq-mini-val" id="sunriseVal">5:28 AM</div>
            </div>
            <div class="aq-mini">
              <div class="aq-mini-label">Sunset</div>
              <div class="aq-mini-val" id="sunsetVal">7:25 PM</div>
            </div>
            <div class="aq-mini">
              <div class="aq-mini-label">Pressure</div>
              <div class="aq-mini-val">1013 hPa</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- HOURLY FORECAST -->
    <div class="glass-card hourly-card">
      <div class="section-header">
        <div class="section-title">Hourly Forecast</div>
        <div class="section-tabs">
          <button class="section-tab active" onclick="setTab(this,'hourly')">Today</button>
          <button class="section-tab" onclick="setTab(this,'weekly')">Weekly</button>
        </div>
      </div>
      <div class="hourly-scroll" id="hourlyScroll"></div>
    </div>

    <!-- BOTTOM GRID -->
    <div class="bottom-grid">

      <!-- 7-DAY FORECAST -->
      <div class="glass-card forecast-card">
        <div class="section-header">
          <div class="section-title">7-Day Forecast</div>
        </div>
        <div class="forecast-rows" id="forecastRows"></div>
      </div>

      <!-- OTHER CITIES -->
      <div class="glass-card cities-card">
        <div class="section-header">
          <div class="section-title">Other Cities</div>
        </div>
        <div class="city-rows" id="cityRows"></div>
      </div>

    </div>

  </main>
</div>

<script>
// ═══════════════════════════════════════════════════
// MOCK DATA
// ═══════════════════════════════════════════════════
const CITIES = {
  madrid:   { city:'Madrid',   country:'Spain',        temp:19, feels:17, humidity:4,  wind:12, rain:80, vis:8,  desc:'Mostly Cloudy', cond:'cloudy', sunrise:'6:21 AM', sunset:'7:30 PM', uv:4 },
  london:   { city:'London',   country:'UK',           temp:12, feels:9,  humidity:78, wind:18, rain:60, vis:5,  desc:'Rainy',         cond:'rainy',  sunrise:'6:55 AM', sunset:'5:45 PM', uv:2 },
  mumbai:   { city:'Mumbai',   country:'India',        temp:34, feels:38, humidity:85, wind:11, rain:20, vis:7,  desc:'Sunny & Hot',   cond:'sunny',  sunrise:'6:10 AM', sunset:'6:35 PM', uv:9 },
  new_york: { city:'New York', country:'USA',          temp:5,  feels:1,  humidity:60, wind:24, rain:30, vis:6,  desc:'Snowing',       cond:'snowy',  sunrise:'6:48 AM', sunset:'5:20 PM', uv:1 },
  paris:    { city:'Paris',    country:'France',       temp:15, feels:13, humidity:65, wind:14, rain:55, vis:8,  desc:'Light Rain',    cond:'rainy',  sunrise:'7:02 AM', sunset:'5:52 PM', uv:3 },
  tokyo:    { city:'Tokyo',    country:'Japan',        temp:22, feels:21, humidity:55, wind:9,  rain:10, vis:12, desc:'Clear Sky',     cond:'sunny',  sunrise:'5:58 AM', sunset:'6:05 PM', uv:6 },
  dubai:    { city:'Dubai',    country:'UAE',          temp:42, feels:46, humidity:30, wind:17, rain:0,  vis:15, desc:'Sunny & Clear', cond:'sunny',  sunrise:'6:20 AM', sunset:'6:40 PM', uv:11 },
  nashik:   { city:'Nashik',   country:'India',        temp:29, feels:31, humidity:60, wind:10, rain:15, vis:10, desc:'Partly Cloudy', cond:'cloudy', sunrise:'6:18 AM', sunset:'6:28 PM', uv:7 },
};

const CONDITION_MAP = {
  sunny: '☀️', rainy: '🌧️', cloudy: '⛅', snowy: '❄️', stormy: '⛈️'
};

const FORECAST_DATA = [
  { day:'Today', icon:'⛅', hi:19, lo:13, pct:60 },
  { day:'Mon',   icon:'🌧️', hi:16, lo:10, pct:80 },
  { day:'Tue',   icon:'☀️', hi:22, lo:14, pct:10 },
  { day:'Wed',   icon:'⛅', hi:20, lo:12, pct:40 },
  { day:'Thu',   icon:'☀️', hi:24, lo:15, pct:5  },
  { day:'Fri',   icon:'🌧️', hi:18, lo:11, pct:75 },
  { day:'Sat',   icon:'⛅', hi:20, lo:13, pct:30 },
];

const OTHER_CITIES = [
  { name:'Montreal', country:'Canada',  temp:19, desc:'Mid Rain',  emoji:'🌧️' },
  { name:'Toronto',  country:'Canada',  temp:20, desc:'Fast Wind', emoji:'💨' },
  { name:'Tokyo',    country:'Japan',   temp:13, desc:'Showers',   emoji:'⛈️' },
];

const HOURLY = [
  { t:'12 AM', e:'🌙', temp:16, rain:'20%' },
  { t:'3 AM',  e:'🌙', temp:15, rain:'30%' },
  { t:'6 AM',  e:'🌅', temp:14, rain:'25%' },
  { t:'9 AM',  e:'⛅', temp:17, rain:'45%' },
  { t:'Now',   e:'⛅', temp:19, rain:'60%', now:true },
  { t:'3 PM',  e:'🌧️', temp:18, rain:'70%' },
  { t:'6 PM',  e:'🌦️', temp:17, rain:'55%' },
  { t:'9 PM',  e:'🌙', temp:15, rain:'20%' },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let isCelsius = true;
let currentData = CITIES['madrid'];
const HISTORY_KEY = 'skycast_history';

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const toF = c => Math.round(c * 9/5 + 32);
const fmt = c => isCelsius ? `${Math.round(c)}°C` : `${toF(c)}°F`;
const fmtShort = c => isCelsius ? `${Math.round(c)}°` : `${toF(c)}°`;

const getDate = () => new Date().toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long' });

const getHistory = () => { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } };
const saveHistory = city => {
  const h = [city, ...getHistory().filter(c => c.toLowerCase() !== city.toLowerCase())].slice(0, 5);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
};

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
const renderHero = () => {
  const d = currentData;
  document.getElementById('heroCity').textContent = d.city;
  document.getElementById('heroCountry').textContent = d.country;
  document.getElementById('heroDate').textContent = getDate();
  document.getElementById('heroTemp').textContent = fmtShort(d.temp);
  document.getElementById('heroDesc').textContent = d.desc;
  document.getElementById('heroSub').textContent = `Feels like ${fmtShort(d.feels)}`;
  document.getElementById('heroEmoji').textContent = CONDITION_MAP[d.cond] || '⛅';
  document.getElementById('statHumidity').textContent = `${d.humidity}%`;
  document.getElementById('statWind').textContent = `${d.wind} km/h`;
  document.getElementById('statRain').textContent = `${d.rain}%`;
  document.getElementById('statVis').textContent = `${d.vis} km`;
  document.getElementById('sunriseVal').textContent = d.sunrise;
  document.getElementById('sunsetVal').textContent = d.sunset;
};

const renderHourly = () => {
  document.getElementById('hourlyScroll').innerHTML = HOURLY.map(h => `
    <div class="hour-card ${h.now ? 'now' : ''}">
      <div class="hour-time">${h.t}</div>
      <div class="hour-emoji">${h.e}</div>
      <div class="hour-temp">${isCelsius ? h.temp + '°' : toF(h.temp) + '°'}</div>
      <div class="hour-rain">${h.rain}</div>
    </div>
  `).join('');
};

const renderForecast = () => {
  document.getElementById('forecastRows').innerHTML = FORECAST_DATA.map((f, i) => `
    <div class="forecast-row ${i===0?'today':''}">
      <div class="forecast-day">${f.day}</div>
      <div class="forecast-icon">${f.icon}</div>
      <div class="forecast-bar-wrap">
        <div class="forecast-bar-fill" style="width:${f.pct}%"></div>
      </div>
      <div class="forecast-temps">
        <span class="temp-hi">${fmtShort(f.hi)}</span>
        <span class="temp-lo">${fmtShort(f.lo)}</span>
      </div>
    </div>
  `).join('');
};

const renderCities = () => {
  document.getElementById('cityRows').innerHTML = OTHER_CITIES.map(c => `
    <div class="city-row" onclick="quickLoad('${c.name}')">
      <div class="city-emoji">${c.emoji}</div>
      <div class="city-info">
        <div class="city-name-text">${c.name}</div>
        <div class="city-desc">${c.country} · ${c.desc}</div>
      </div>
      <div class="city-temp-big">${fmtShort(c.temp)}</div>
    </div>
  `).join('');
};

const renderAll = () => { renderHero(); renderHourly(); renderForecast(); renderCities(); };

// ═══════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════
const doSearch = async (name) => {
  const query = name || document.getElementById('searchInput').value.trim();
  if (!query) return;

  const key = query.toLowerCase().replace(/\s+/g, '_');
  const data = CITIES[key];

  document.getElementById('heroCity').textContent = '...';
  document.getElementById('heroTemp').textContent = '—';

  await new Promise(r => setTimeout(r, 700));

  if (data) {
    currentData = data;
    saveHistory(data.city);
    renderHistoryList();
    renderAll();
  } else {
    document.getElementById('heroCity').textContent = query;
    document.getElementById('heroDesc').textContent = 'City not found';
    document.getElementById('heroTemp').textContent = '?°';
    document.getElementById('heroEmoji').textContent = '🌐';
    document.getElementById('heroDate').textContent = 'Try: London, Mumbai, Tokyo…';
  }
};

const handleKey = (e) => { if (e.key === 'Enter') doSearch(); };
const quickLoad = (city) => { document.getElementById('searchInput').value = city; doSearch(city); };
const useLocation = () => {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(() => quickLoad('Mumbai'), () => {});
};

// ═══════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════
const renderHistoryList = () => {
  const h = getHistory();
  const panel = document.getElementById('historyList');
  panel.innerHTML = h.map(c => `
    <div class="history-row" onmousedown="quickLoad('${c}')">
      <span>🕐</span> ${c}
    </div>
  `).join('');
};

const showHistory = () => {
  renderHistoryList();
  const h = getHistory();
  if (h.length > 0) document.getElementById('historyPanel').classList.add('show');
};
const hideHistory = () => setTimeout(() => document.getElementById('historyPanel').classList.remove('show'), 200);

// ═══════════════════════════════════════════════════
// THEME + UNIT + NAV
// ═══════════════════════════════════════════════════
const toggleTheme = () => {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
};

const setUnit = (celsius) => {
  isCelsius = celsius;
  document.getElementById('pillC').classList.toggle('active', celsius);
  document.getElementById('pillF').classList.toggle('active', !celsius);
  renderAll();
};

const setNav = (el) => {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
};

const setTab = (el, tab) => {
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
};

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderAll();
</script>
</body>
</html>
