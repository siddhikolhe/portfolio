<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Manage Products</title>
  <link rel="stylesheet" href="CSS/product.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h2>🛒 Admin Panel - Manage Products</h2>
    <button class="add-btn" onclick="openForm()">+ Add New Product</button>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
      <i class="fas fa-search"></i>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Type</th>
          <th>Unit</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Operation</th>
          <th>Notes</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="productList"></tbody>
    </table>
  </div>

  <!-- Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeForm()">×</span>
      <h3><b>Add / Edit Product</b></h3>
      <input type="text" id="name" placeholder="Product Name">
      <input type="text" id="category" placeholder="Category">
      <input type="text" id="type" placeholder="Type">
      <input type="text" id="unit" placeholder="Unit">
      <input type="number" id="price" placeholder="Price">
      <input type="number" id="quantity" placeholder="Quantity">
      <input type="text" id="operation" placeholder="Operation">
      <input type="text" id="notes" placeholder="Notes">
      <button class="btn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>

  <script>
    let products = [];
    let editIndex = null;

    function openForm() {
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeForm() {
      document.getElementById('productModal').style.display = 'none';
      clearForm();
    }

    function clearForm() {
      document.getElementById('name').value = "";
      document.getElementById('category').value = "";
      document.getElementById('type').value = "";
      document.getElementById('unit').value = "";
      document.getElementById('price').value = "";
      document.getElementById('quantity').value = "";
      document.getElementById('operation').value = "";
      document.getElementById('notes').value = "";
      editIndex = null;
    }

    function saveProduct() {
      const name = document.getElementById('name').value.trim();
      const category = document.getElementById('category').value.trim();
      const type = document.getElementById('type').value.trim();
      const unit = document.getElementById('unit').value.trim();
      const price = document.getElementById('price').value.trim();
      const quantity = document.getElementById('quantity').value.trim();
      const operation = document.getElementById('operation').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if (!name || !category || !type || !unit || !price || !quantity || !operation || !notes) {
        alert("Please fill all fields.");
        return;
      }

      const product = { name, category, type, unit, price, quantity, operation, notes };

      if (editIndex !== null) {
        products[editIndex] = product;
      } else {
        products.push(product);
      }

      renderProducts();
      closeForm();
    }

    function renderProducts() {
      const list = document.getElementById('productList');
      list.innerHTML = "";

      products.forEach((p, index) => {
        list.innerHTML += `
          <tr>
            <td>${p.name}</td>
            <td>${p.category}</td>
            <td>${p.type}</td>
            <td>${p.unit}</td>
            <td>${p.price}</td>
            <td>${p.quantity}</td>
            <td>${p.operation}</td>
            <td>${p.notes}</td>
            <td>
              <button class="action-btn edit-btn" onclick="editProduct(${index})">Edit</button>
              <button class="action-btn delete-btn" onclick="deleteProduct(${index})">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    function editProduct(index) {
      const p = products[index];
      document.getElementById('name').value = p.name;
      document.getElementById('category').value = p.category;
      document.getElementById('type').value = p.type;
      document.getElementById('unit').value = p.unit;
      document.getElementById('price').value = p.price;
      document.getElementById('quantity').value = p.quantity;
      document.getElementById('operation').value = p.operation;
      document.getElementById('notes').value = p.notes;
      editIndex = index;
      openForm();
    }

    function deleteProduct(index) {
      if (confirm("Are you sure you want to delete this product?")) {
        products.splice(index, 1);
        renderProducts();
      }
    }

    function searchProducts() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const rows = document.querySelectorAll("#productList tr");

      rows.forEach(row => {
        const cells = row.getElementsByTagName("td");
        let match = false;
        for (let i = 0; i < cells.length - 1; i++) {
          if (cells[i].innerText.toLowerCase().includes(keyword)) {
            match = true;
            break;
          }
        }
        row.style.display = match ? "" : "none";
      });
    }

    window.onclick = function(event) {
      if (event.target == document.getElementById('productModal')) {
        closeForm();
      }
    }
  </script>
</body>
</html>
