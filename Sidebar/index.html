    <script>
        //Header Logout ->Dropdown
        document.addEventListener("DOMContentLoaded", function () {
            const dropdownToggle = document.getElementById("userDropdownToggle");
            const dropdown = document.getElementById("userDropdown");

            dropdownToggle.addEventListener("click", function (e) {
                e.stopPropagation();
                dropdown.classList.toggle("show");
            });

            document.addEventListener("click", function () {
                dropdown.classList.remove("show");
            });

            // CHANGED: Added function to load and display user name from localStorage
            // This retrieves the name stored during login and displays it in the header
            loadUserName();
        });

        // CHANGED: New function to load user name from localStorage
        // This function checks if a user name is stored and displays it with "Welcome" prefix
        function loadUserName() {
            const userName = localStorage.getItem("name");
            const userNameElement = document.getElementById("userName");
            
            if (userName && userNameElement) {
                // Display "Welcome [UserName]" instead of hardcoded "Abhishek"
                userNameElement.textContent = `Welcome ${userName}`;
            } else {
                // Fallback text if no name is found in localStorage
                userNameElement.textContent = "Welcome Guest";
            }
        }

        //header
        document.getElementById('menuToggle').addEventListener('click', function () {
            console.log('Menu toggle clicked');
            // Add your menu toggle functionality here
        });

        class SidebarManager {
            constructor() {
                this.sidebar = document.getElementById('sidebar');
                this.headerMenuButton = document.getElementById('menuToggle');
                this.mainContent = document.getElementById('mainContent');
                this.navLinks = document.querySelectorAll('.nav-link');
                this.pages = document.querySelectorAll('.page-section');

                this.init();
            }

            init() {
                // Header menu button click - toggles sidebar collapse
                this.headerMenuButton.addEventListener('click', () => {
                    this.toggleSidebar();
                });

                // Navigation links click
                this.navLinks.forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();

                        const page = link.getAttribute('data-page');
                        this.setActiveNav(link);
                        this.showPage(page);
                    });
                });
            }

            toggleSidebar() {
                this.sidebar.classList.toggle('collapsed');

                // Adjust main content margin
                if (this.sidebar.classList.contains('collapsed')) {
                    this.mainContent.style.marginLeft = '60px';
                } else {
                    this.mainContent.style.marginLeft = '220px';
                }
            }

            setActiveNav(activeLink) {
                // Remove active class from all links
                this.navLinks.forEach(link => {
                    link.classList.remove('active');
                });

                // Add active class to clicked link
                activeLink.classList.add('active');
            }

            showPage(pageId) {
                // Hide all pages
                this.pages.forEach(page => {
                    page.classList.remove('active');
                });

                // Show selected page
                const targetPage = document.getElementById(pageId);
                if (targetPage) {
                    targetPage.classList.add('active');
                }
            }

            // Public methods for external use
            collapse() {
                this.sidebar.classList.add('collapsed');
                this.mainContent.style.marginLeft = '60px';
            }

            expand() {
                this.sidebar.classList.remove('collapsed');
                this.mainContent.style.marginLeft = '220px';
            }

            setActivePage(page) {
                const link = document.querySelector(`[data-page="${page}"]`);
                if (link) {
                    this.setActiveNav(link);
                    this.showPage(page);
                }
            }
        }

        // Initialize sidebar when DOM is loaded
        document.addEventListener('DOMContentLoaded', function () {
            const sidebarManager = new SidebarManager();

            // Global functions for external use
            window.toggleSidebar = () => sidebarManager.toggleSidebar();
            window.setSidebarActive = (page) => sidebarManager.setActivePage(page);
            window.collapseSidebar = () => sidebarManager.collapse();
            window.expandSidebar = () => sidebarManager.expand();
        });

        // Handle responsive behavior
        window.addEventListener('resize', function () {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');

            if (window.innerWidth <= 768) {
                mainContent.style.marginLeft = '0';
            } else {
                if (sidebar.classList.contains('collapsed')) {
                    mainContent.style.marginLeft = '60px';
                } else {
                    mainContent.style.marginLeft = '220px';
                }
            }
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const logoutBtn = document.getElementById("logoutBtn");

            if (logoutBtn) {
                logoutBtn.addEventListener("click", async function () {
                    const token = localStorage.getItem("token");

                    // If no token, alert and redirect to login
                    if (!token) {
                        alert("Are You Sure You Want To Logout");
                        window.location.href = "../../Glamora_website/login.html"; // Adjust path if needed
                        return;
                    }

                    try {
                        const res = await fetch("https://localhost:44353/api/login/logout", {
                            method: "POST",
                            headers: {
                                "Authorization": "Bearer " + token,
                            },
                        });

                        const result = await res.json();

                        if (res.ok) {
                            alert(result.message || "Logged out successfully.");
                        } else {
                            alert("Logout failed: " + (result.message || "Unknown error."));
                        }

                    } catch (error) {
                        alert("Network error during logout: " + error.message);
                    }

                    // Always clear localStorage and redirect regardless of success/failure
                    localStorage.removeItem("token");
                    localStorage.removeItem("role");
                    localStorage.removeItem("name");
                    localStorage.removeItem("customerId");

                    window.location.href = "../../Glamora_website/login.html"; // Adjust path if needed
                });
            }
        });
    </script>
